        eventLoginErrorBody=Une tentative de connexion échouée a été détectée sur votre compte {0} depuis {1}. Si ce n''était pas vous, veuillez contacter un administrateur.
eventLoginErrorBodyHtml=<p>Une tentative de connexion échouée a été détectée sur votre compte {0} depuis {1}. Si ce n''était pas vous, veuillez contacter un administrateur.</p>

