# Email verification (français)
emailVerificationSubject=Vérifier l''adresse e-mail
emailVerificationGreeting=Bonjour
        emailVerificationBody=Nous avons enregistré la création d''un compte {0} avec cette adresse e-mail. Si vous en êtes bien l''auteur, veuillez cliquer sur le lien ci-dessous pour vérifier votre adresse e-mail.\n\nVeuillez noter que ce lien expirera dans {1} minutes. Si vous n''avez pas initié cette création de compte, vous pouvez ignorer ce message en toute sécurité.
emailVerificationBodyHtml=<p>Nous avons enregistré la création d''un compte {0} avec cette adresse e-mail. Si vous en êtes bien l''auteur, veuillez cliquer sur le lien ci-dessous pour vérifier votre adresse e-mail.</p><p>Veuillez noter que ce lien expirera dans {1} minutes. Si vous n''avez pas initié cette création de compte, vous pouvez ignorer ce message en toute sécurité.</p>
emailVerificationLinkTextHtml=Vérifiez votre adresse e-mail

# Identity provider link (français)
identityProviderLinkSubject=Lier {0}
identityProviderLinkBody=Quelqu''un souhaite lier votre compte "{1}" avec le compte "{0}" de l''utilisateur {2}. Si cela vient de vous, cliquez sur le lien ci-dessous pour lier les comptes.\n\n{3}\n\nCe lien expirera dans {4} minutes.\n\nSi vous ne voulez pas lier les comptes, ignorez simplement ce message. Si vous liez les comptes, vous pourrez vous connecter à {1} via {0}.
identityProviderLinkBodyHtml=<p>Quelqu''un souhaite lier votre compte <b>{1}</b> avec le compte <b>{0}</b> de l''utilisateur {2}. Si cela vient de vous, cliquez sur le lien ci-dessous pour lier les comptes.</p><p>Ce lien expirera dans {4} minutes.</p><p>Si vous ne voulez pas lier les comptes, ignorez simplement ce message. Si vous liez les comptes, vous pourrez vous connecter à {1} via {0}.</p>
identityProviderLinkLinkTextHtml=Lier les comptes

# Password reset (français)
passwordResetSubject=Réinitialiser le mot de passe
        passwordResetBody=<p>Nous avons enregistré une demande de réinitialisation de votre mot de passe. Si cela vient de vous, cliquez sur le lien ci-dessous pour le réinitialiser.</p><p>Ce lien expirera dans {1} minutes.</p><p>Si vous n''etes pas à l''origine de cette demande, vous pouvez ignorer ce message en toute sécurité.</p>
passwordResetBodyHtml=<p>Nous avons enregistré une demande de réinitialisation de votre mot de passe. Si cela vient de vous, cliquez sur le lien ci-dessous pour le réinitialiser.</p><p>Ce lien expirera dans {1} minutes.</p><p>Ce lien expirera dans {1} minutes.</p><p>Si vous n''etes pas à l''origine de cette demande, vous pouvez ignorer ce message en toute sécurité.</p>
passwordResetLinkTextHtml=Réinitialiser votre mot de passe

# Execute account actions (français)
executeActionsSubject=Validation de compte
        executeActionsBody=Votre administrateur vient de demander la création de votre compte {2}. Veuillez suivre les instructions pour la validation de votre e-mail et la mise à jour de vos informations : {3}. Cliquez sur le lien ci-dessous pour commencer le processus.\n\n{0}\n\nCe lien expire dans {4} minutes.\n\nSi vous n''êtes pas à l''origine de cette requête, ignorez ce message. Aucun changement ne sera effectué sur votre compte.
executeActionsBodyHtml=<p>Votre administrateur vient de demander la création de votre compte {2}.<br/>Veuillez suivre les instructions en cliquant sur le lien ci-dessous pour valider votre e-mail et mettre à jour vos informations.</p><p><a href="{0}" style="color:#fff" class="Button">Validez votre adresse e-mail</a></p><br/><p>Ce lien expire dans {2} minutes.</p><p>Si vous n''êtes pas à l''origine de cette requête, ignorez ce message. Aucun changement ne sera effectué sur votre compte.</p>
executeActionsLinkTextHtml=Validez votre adresse

